name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: npm install -g gradle && gradle wrapper

    - name: Create Init Script for Repositories
      run: |
        mkdir -p .github/workflows
        cat << 'EOF' > .github/workflows/init.gradle
        allprojects {
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                }
            }
            repositories {
                google()
                mavenCentral()
            }
        }
        settingsEvaluated { settings ->
            settings.pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
        }
        EOF

    - name: Build debug APK
      run: gradle assembleDebug --init-script .github/workflows/init.gradle

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build/outputs/apk/debug/app-debug.apk
